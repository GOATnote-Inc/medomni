# MedOmni reproducibility manifest — schema and template
#
# One captured manifest per (date, run-id) tuple under reproducibility/captured/.
# Generated by `scripts/freeze_snapshot.py`. Verified by `scripts/freeze_verify_all.py`.
# Replayed by `make reproduce SESSION=<id>`.
#
# Every layer here is what makes the next "did MedOmni really score X?" defensible.

session:
  id: "TEMPLATE"                                # set by freeze_snapshot.py
  date: "TEMPLATE"                              # ISO-8601, set at capture time
  purpose: "free-form description of what this run measured"
  fixture_used: "corpus/clinical-demo/CLN-DEMO-TAMOXIFEN-MIRENA"  # which acceptance test

# Layer 1 — bare metal
bare_metal:
  driver_version: "TEMPLATE"                    # nvidia-smi → driver_version (e.g., 580.126.09)
  cuda_toolkit: "13.2"
  nccl: "TEMPLATE"
  pod_provider: "TEMPLATE"                      # brev | runpod
  pod_id: "TEMPLATE"                            # x3rytha2l | pdlpt96nl | fqi5lcbn22pl9o
  gpu_type: "TEMPLATE"                          # NVIDIA H100 PCIe | H100 SXM HBM3 | H200 SXM
  gpu_count: 1

# Layer 2 — container runtime
container_runtime:
  docker_version: "TEMPLATE"
  nvidia_container_toolkit: "TEMPLATE"

# Layer 3 — GPU stack pins
gpu_stack:
  cudnn: "TEMPLATE"                             # 9.21.1 expected for CUDA 13.2
  cuvs: "TEMPLATE"
  rapids: "TEMPLATE"
  nx_cugraph: "TEMPLATE"
  triton: "TEMPLATE"

# Layer 4 — inference container (digest, never tag)
inference:
  serve_image: "TEMPLATE"                       # e.g., vllm/vllm-openai@sha256:abc...
  serve_image_resolved_tag: "TEMPLATE"          # human-readable; for context only
  trtllm_image: null                            # optional; null if not used
  triton_server_image: null                     # optional; null if not used
  nim_image: null                               # optional; null if not used

# Layer 5 — model weight revisions (HF revision SHAs)
models:
  inference:
    id: "nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4"
    revision: "TEMPLATE"                        # HF revision SHA (snapshot_download(revision=...))
  embedding:
    id: "nvidia/NV-Embed-v2"
    revision: "TEMPLATE"
  rerank:
    id: "nvidia/llama-3.2-nv-rerankqa-1b-v2"   # placeholder — confirm exact ID
    revision: "TEMPLATE"
  guard:
    id: "meta-llama/Llama-Guard-3-8B"
    revision: "TEMPLATE"
  judge:
    id: "TEMPLATE"                              # whichever model judges this run
    revision: "TEMPLATE"

# Layer 6 — corpora + graph artifacts
corpus:
  openem:
    repo: "GOATnote-Inc/openem-corpus"
    commit: "TEMPLATE"                          # full git SHA
    file_count: 370                             # sanity check
  pubmed_oa:
    snapshot_date: "TEMPLATE"                   # ISO-8601 date of bulk download
    file_count: "TEMPLATE"
  cochrane:
    access_method: "via partner"                # not redistributed
    snapshot_date: "TEMPLATE"

graph:
  build_artifact_path: "data/lazygraph/openem_370_persona_tagged_v1.gpickle"
  build_artifact_sha: "TEMPLATE"                # SHA-256 of the .gpickle bytes
  node_count: "TEMPLATE"
  edge_count: "TEMPLATE"
  leiden_resolution: 0.5
  community_count: "TEMPLATE"
  embedding_index_path: "data/embeddings/openem_nv_embed_v2.cuvs"
  embedding_index_sha: "TEMPLATE"

# Layer 7 — eval framework
eval:
  rubric_id: "CLN-DEMO-TAMOXIFEN-MIRENA-v1"
  rubric_sha: "TEMPLATE"                        # SHA-256 of rubric.json bytes
  judge_model_id: "TEMPLATE"
  judge_model_revision: "TEMPLATE"
  judge_endpoint_url: "http://127.0.0.1:8001/v1"  # localhost-only enforced
  scoring_math:
    library: "openai/simple-evals"
    commit: "ee3b0318d8d1d9d72755a4120879be65f7c07e9e"   # pinned; do not bump without re-verify
    primitives_used: ["RubricItem", "calculate_score", "GRADER_TEMPLATE"]
  fixture_sha: "TEMPLATE"                       # SHA-256 of case.json bytes
  ideal_answer_sha: "TEMPLATE"                  # SHA-256 of ideal-answer.md bytes
  n_trials: 3
  n_examples_per_trial: 1                       # tamoxifen is a single-case fixture; bench shapes vary

# Layer 8 — sampling hyperparameters
sampling:
  seed: 42
  temperature: 0.6                              # reasoning-mode default per Omni recipe
  top_p: null
  top_k: null
  max_tokens: 1024
  thinking_token_budget: 16384                  # Omni-specific; reasoning-mode budget
  enable_thinking: true                         # per-persona; physician/nurse may toggle differently

# Layer 9 — result artifact
result:
  artifact_json_path: "TEMPLATE"                # results/r1.5-omni-tamoxifen-<date>/<run-id>.json
  artifact_json_sha: "TEMPLATE"
  card_md_path: "TEMPLATE"                      # results/r1.5-omni-tamoxifen-<date>/CARD.md
  card_md_sha: "TEMPLATE"
  rubric_score_mean: null                       # mean across N=3 trials
  rubric_score_hw95: null                       # 95% half-width
  per_axis_scores: null                         # see HEALTHBENCH_AXES in healthbench_runner

# Audit envelope — who/what/why
audit:
  captured_by: "freeze_snapshot.py"
  captured_at: "TEMPLATE"                       # ISO-8601 timestamp
  cli_user: "TEMPLATE"
  hostname: "TEMPLATE"
  git_repo_sha: "TEMPLATE"                      # this repo's HEAD at capture time
  git_repo_dirty: false
  notes: ""

# Drift policy
drift_policy:
  on_drift: "halt"                              # halt | warn | allow-with-explicit-reason
  allow_drift_layers: []                        # explicit allowlist if drift is intentional
  allow_drift_commit_message_marker: "[allow-drift-reason:"  # commit must include this
