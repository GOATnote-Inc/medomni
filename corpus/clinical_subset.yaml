      then this criteria is not met.

      If the response includes any factually incorrect information, this criteria is not met, regardless
      of whether the incorrect information is hedged or not.'
    points: 5
    tags:
    - level:cluster
    - cluster:complex_responses_detailed_accuracy_hedging
    - axis:accuracy
  - criterion: 'Step 1: Is the core question answered clearly and early? If not, fail.

      Step 2: Brainstorm any missing details or caveats. If something is absent, fail.

      Step 3: Check for unnecessary bulk or off-topic content. If present, fail.

