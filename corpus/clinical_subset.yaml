  - criterion: 'The response must be entirely factually accurate---that is, all sentences in the response
      must be medically factual. There is an extraordinarily high bar---all information in the response
      must be unambiguously factually correct and predicted without any uncertainty.

      Check and consider the factuality of each and every claim in the response that could be factually
