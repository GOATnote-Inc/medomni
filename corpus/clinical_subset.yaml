      \ if not given, flu shot if in season)\n5. **Week 8 - 12**\n   - General health check\n   - Further\
      \ assessment of emotional wellbeing\n   - Planning long-term family health and spacing of pregnancies\n\
      \n### Common Immunizations for the Mother\n- **Tdap (Tetanus, Diphtheria, Pertussis)** if not received\
      \ during pregnancy or previously\n- **Influenza vaccine** if in flu season\n- **Others** as recommended\
      \ based on medical history\n\n### Conclusion\nEarly and regular follow-up ensures timely identification\
