# Project-local ssh config for the RunPod "prism" H100 pod.
# Used via:  ssh -F configs/ssh_runpod.conf runpod-prism
#
# - No modification of ~/.ssh/config (no global persistence).
# - StrictHostKeyChecking accept-new: trust-on-first-use, then verify
#   (default after first connection). NOT disabled.
# - UserKnownHostsFile is project-local (configs/ssh_known_hosts) so
#   first-use trust is recorded here and re-verified on every later use.

# Use the RunPod ssh proxy form. It authenticates against the user's
# RunPod account keys (set in console.runpod.io → Settings → SSH Keys),
# NOT against the pod-image's authorized_keys file. Stable across pod
# stop+resume; port doesn't change because we go through the proxy on 22.
Host runpod-prism
  Hostname ssh.runpod.io
  User fqi5lcbn22pl9o-64411fbd
  IdentityFile ~/.ssh/id_ed25519
  IdentitiesOnly yes
  ServerAliveInterval 30
  StrictHostKeyChecking accept-new
  UserKnownHostsFile configs/ssh_known_hosts

# Direct-IP form kept as a fallback (authenticates against pod-image
# authorized_keys; works only if the image syncs keys at boot).
# IP/port change on stop+resume — re-check via the API query above
# before using.
Host runpod-prism-direct
  Hostname 64.247.201.48
  Port 17407
  User root
  IdentityFile ~/.ssh/id_ed25519
  IdentitiesOnly yes
  ServerAliveInterval 30
  StrictHostKeyChecking accept-new
  UserKnownHostsFile configs/ssh_known_hosts
