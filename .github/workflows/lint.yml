name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: detect-secrets scan
        run: |
          if [ -f .detect-secrets.baseline ]; then
            detect-secrets-hook --baseline .detect-secrets.baseline $(git ls-files | tr '\n' ' ')
          else
            detect-secrets scan --all-files --exclude-files '\.lock$|results/.*' > /dev/null
          fi

      # TruffleHog OSS — verifier-based secret scanning. Replaces gitleaks-action
      # (which moved to a paid-license model in 2025). Aligns medomni with the
      # NVIDIA core OSS convention used by NVIDIA/bionemo-framework,
      # NVIDIA/Model-Optimizer, NVIDIA/dsx-github-actions/.../trufflehog-scan,
      # NVIDIA/terraform-provider-ngc, NVIDIA/nvflow. Apache-2.0 binary;
      # AGPL-3.0 on the source — using the binary in CI does not trigger
      # AGPL distribution obligations (no network service offered, no binary
      # redistributed).
      #
      # `--results=verified,unknown` excludes unverified false-positive matches
      # (live API checks on 700+ verifiers eliminate the FP fatigue that made
      # gitleaks noisy on a public repo).
      # Do not pass explicit base/head. On push to main the prior config
      # resolved base=`main` and head=`HEAD` to the same commit (the push
      # commit IS the new head of main), tripping TruffleHog's
      # "BASE and HEAD commits are the same" error and red-X'ing every
      # push since the workflow landed. Leaving them unset lets the
      # action infer from the event payload: push → before..after diff;
      # pull_request → base..head diff; schedule / workflow_dispatch →
      # full-history scan.
      - name: TruffleHog OSS — verifier-based secret scan
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          extra_args: --results=verified,unknown
