name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: detect-secrets scan
        run: |
          if [ -f .detect-secrets.baseline ]; then
            detect-secrets-hook --baseline .detect-secrets.baseline $(git ls-files | tr '\n' ' ')
          else
            detect-secrets scan --all-files --exclude-files '\.lock$|results/.*' > /dev/null
          fi

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
