name: clinical-skill-review

# Track #3 of the Cherny-pattern initiative: 100% of clinical-content PRs are
# auto-reviewed by Claude Opus 4.7 BEFORE human review. Boris Cherny reports
# Anthropic operates this gate on 100% of internal PRs; we scope it here to
# clinical-content paths only (skills/*, system_prompt_v1, corpus pins).
#
# Verdicts: PASS / FLAG / BLOCK. BLOCK exits non-zero so branch protection
# (when enabled) keeps the PR un-mergeable. PASS/FLAG post a review comment
# but allow merge; FLAG is "land + open follow-up."
#
# Rubric (full text in scripts/clinical_skill_review.py):
#   - hallucination risk in clinical content
#   - ambiguity in tool-call instructions to the model
#   - contradicts an existing safety rule
#   - missing PHI guardrails
#   - unverified guideline citations
#
# Reuses existing repo secret ANTHROPIC_API_KEY_PR_REVIEW (same key used by
# .github/workflows/agent-pr-review.yml). No new secrets added.

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "web/lib/agent/skills/**/*.md"
      - "mvp/medomni-inference/skills/**/*.md"
      - "mvp/medomni-inference/system_prompt_v1.md"
      - "corpus/pins/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  clinical-skill-review:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install anthropic SDK
        run: python -m pip install --quiet anthropic>=0.39.0

      - name: Run clinical-safety review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_PR_REVIEW }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY_PR_REVIEW secret not set; skipping clinical-safety review"
            exit 0
          fi
          python scripts/clinical_skill_review.py
